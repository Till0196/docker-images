name: build sharelatex image
run-name: build sharelatex image - ${{ github.event_name }}

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]
    paths:
      - 'sharelatex/**'

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  PUSH_IMAGE: ${{ github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(gh api --paginate "repos/${REPO}/pulls/${PR}/files" --jq '.[].filename')
          if printf '%s\n' "$files" | grep -qE '^(sharelatex/|\.github/workflows/build-sharelatex-image\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  BuildShareLatexImage:
    needs: changes
    if: needs.changes.outputs.relevant == 'true' || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=`echo ghcr.io/${{ github.repository_owner }}/sharelatex | tr '[:upper:]' '[:lower:]'`" >> ${GITHUB_ENV}

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: sharelatex base image build (arm64 only)
        if: ${{ matrix.platform == 'linux/arm64' && env.PUSH_IMAGE == 'true' }}
        run: |
          git clone https://github.com/overleaf/overleaf --depth 1 --recursive sharelatex/overleaf

      - name: sharelatex-base Build and push (arm64 only)
        if: ${{ matrix.platform == 'linux/arm64' && env.PUSH_IMAGE == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./sharelatex/overleaf
          file: sharelatex/overleaf/server-ce/Dockerfile-base
          push: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }}-base,name-canonical=true,push=true
          cache-from: type=gha,scope=sharelatex-base-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=sharelatex-base-${{ env.PLATFORM_PAIR }}

      - name: sharelatex Build and push (arm64 only)
        if: ${{ matrix.platform == 'linux/arm64' && env.PUSH_IMAGE == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./sharelatex/overleaf
          file: sharelatex/overleaf/server-ce/Dockerfile
          build-args: |
            OVERLEAF_BASE_TAG=${{ env.REGISTRY_IMAGE }}-base:latest
          push: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }}-arm64,name-canonical=true,push=true
          cache-from: type=gha,scope=sharelatex-upstream-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=sharelatex-upstream-${{ env.PLATFORM_PAIR }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./sharelatex
          file: sharelatex/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ env.PUSH_IMAGE }}
          cache-from: type=gha,scope=sharelatex-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=sharelatex-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: env.PUSH_IMAGE == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: env.PUSH_IMAGE == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  BuildShareLatexImageGate:
    if: always()
    needs: BuildShareLatexImage
    runs-on: ubuntu-latest
    steps:
      - name: Check build result
        run: |
          result="${{ needs.BuildShareLatexImage.result }}"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            exit 0
          fi
          exit 1

  merge:
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - BuildShareLatexImage
    steps:
      - name: Prepare
        run: |
          echo "REGISTRY_IMAGE=`echo ghcr.io/${{ github.repository_owner }}/sharelatex | tr '[:upper:]' '[:lower:]'`" >> ${GITHUB_ENV}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,prefix=pr-,suffix=,event=pr
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
