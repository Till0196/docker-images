name: build coder image
run-name: build coder image - ${{ github.event_name }}

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]
    paths:
      - 'coder/**'

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  PUSH_IMAGE: ${{ github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch' }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
      matrix_json: ${{ steps.variants.outputs.matrix_json }}
      variants_json: ${{ steps.variants.outputs.variants_json }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(gh api --paginate "repos/${REPO}/pulls/${PR}/files" --jq '.[].filename')
          if printf '%s\n' "$files" | grep -qE '^(coder/|\.github/workflows/build-coder-image\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - id: variants
        run: |
          set -euo pipefail
          shopt -s nullglob

          dockerfiles=(coder/*.Dockerfile)
          if [ "${#dockerfiles[@]}" -eq 0 ]; then
            echo "No Dockerfile variants found under coder/."
            echo "variants_json=[]" >> "$GITHUB_OUTPUT"
            echo "matrix_json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          variants_json=$(printf '%s\n' "${dockerfiles[@]}" | jq -Rsc '
            split("\n")[:-1]
            | map({
                dockerfile: ., 
                variant: (split("/")[-1] | sub("\\.Dockerfile$"; ""))
              })
          ')

          matrix_json=$(jq -cn \
            --argjson variants "$variants_json" \
            '[
              $variants[] as $v |
              { os: "ubuntu-latest", platform: "linux/amd64", dockerfile: $v.dockerfile, variant: $v.variant },
              { os: "ubuntu-24.04-arm", platform: "linux/arm64", dockerfile: $v.dockerfile, variant: $v.variant }
            ]')

          echo "variants_json=${variants_json}" >> "$GITHUB_OUTPUT"
          echo "matrix_json=${matrix_json}" >> "$GITHUB_OUTPUT"

  BuildCoderImage:
    needs: discover
    if: needs.discover.outputs.relevant == 'true' && needs.discover.outputs.matrix_json != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix_json) }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "VARIANT=${{ matrix.variant }}" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=`echo ghcr.io/${{ github.repository_owner }}/coder | tr '[:upper:]' '[:lower:]'`" >> ${GITHUB_ENV}

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./coder
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ env.PUSH_IMAGE }}
          cache-from: type=gha,scope=coder-${{ env.VARIANT }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=coder-${{ env.VARIANT }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: env.PUSH_IMAGE == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${VARIANT} ${digest#sha256:}" > "/tmp/digests/${VARIANT}-${PLATFORM_PAIR}.txt"

      - name: Upload digest
        if: env.PUSH_IMAGE == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.VARIANT }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*.txt
          if-no-files-found: error
          retention-days: 1

  BuildCoderImageGate:
    if: always()
    needs: BuildCoderImage
    runs-on: ubuntu-latest
    steps:
      - name: Check build result
        run: |
          result="${{ needs.BuildCoderImage.result }}"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            exit 0
          fi
          exit 1

  merge:
    if: (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') && needs.discover.outputs.variants_json != '[]'
    runs-on: ubuntu-latest
    needs:
      - discover
      - BuildCoderImage
    steps:
      - name: Prepare
        run: |
          echo "REGISTRY_IMAGE=`echo ghcr.io/${{ github.repository_owner }}/coder | tr '[:upper:]' '[:lower:]'`" >> ${GITHUB_ENV}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest lists and push
        env:
          VARIANTS_JSON: ${{ needs.discover.outputs.variants_json }}
        run: |
          set -euo pipefail

          mapfile -t variants < <(jq -r '.[].variant' <<< "$VARIANTS_JSON")
          for variant in "${variants[@]}"; do
            mapfile -t digests < <(awk -v v="$variant" '$1 == v { print $2 }' /tmp/digests/*.txt)
            if [ "${#digests[@]}" -eq 0 ]; then
              echo "No digests found for variant '$variant'"
              exit 1
            fi

            refs=()
            for digest in "${digests[@]}"; do
              refs+=("${REGISTRY_IMAGE}@sha256:${digest}")
            done

            docker buildx imagetools create \
              -t "${REGISTRY_IMAGE}:${variant}" \
              "${refs[@]}"
          done

      - name: Inspect image tags
        env:
          VARIANTS_JSON: ${{ needs.discover.outputs.variants_json }}
        run: |
          set -euo pipefail

          mapfile -t variants < <(jq -r '.[].variant' <<< "$VARIANTS_JSON")
          for variant in "${variants[@]}"; do
            docker buildx imagetools inspect "${REGISTRY_IMAGE}:${variant}"
          done
