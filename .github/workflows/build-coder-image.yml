name: build coder image
run-name: build coder image - ${{ github.event_name }}

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]
    paths:
      - 'coder/**'

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  IMAGE_NAME: coder
  TARGET_DIR: coder
  PUSH_IMAGE: ${{ github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch' }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
      variants: ${{ steps.variants.outputs.variants }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(gh api --paginate "repos/${REPO}/pulls/${PR}/files" --jq '.[].filename')
          if printf '%s\n' "$files" | grep -qE '^(coder/|\.github/workflows/build-coder-image\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v7

      - id: variants
        run: |
          set -euo pipefail
          shopt -s nullglob

          names=()
          for dockerfile in "${TARGET_DIR}"/*.Dockerfile; do
            name=${dockerfile##*/}
            names+=("${name%.Dockerfile}")
          done

          if [ "${#names[@]}" -eq 0 ]; then
            echo "No Dockerfile variants found under ${TARGET_DIR}/."
            echo "variants=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Found variants: %s\n' "${names[*]}"
          variants=$(printf '%s\n' "${names[@]}" | jq -Rsc 'split("\n")[:-1]')
          echo "variants=${variants}" >> "$GITHUB_OUTPUT"

  BuildCoderImage:
    needs: discover
    if: needs.discover.outputs.relevant == 'true' && needs.discover.outputs.variants != '[]'
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.discover.outputs.variants) }}
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=`echo ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]'`" >> ${GITHUB_ENV}

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.TARGET_DIR }}
          file: ${{ env.TARGET_DIR }}/${{ matrix.variant }}.Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ env.PUSH_IMAGE }}
          cache-from: type=gha,scope=coder-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=coder-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: env.PUSH_IMAGE == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: env.PUSH_IMAGE == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  BuildCoderImageGate:
    if: always()
    needs: BuildCoderImage
    runs-on: ubuntu-latest
    steps:
      - name: Check build result
        run: |
          result="${{ needs.BuildCoderImage.result }}"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            exit 0
          fi
          exit 1

  merge:
    if: (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') && needs.discover.outputs.variants != '[]'
    runs-on: ubuntu-latest
    needs:
      - discover
      - BuildCoderImage
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.discover.outputs.variants) }}
    steps:
      - name: Prepare
        run: |
          echo "REGISTRY_IMAGE=`echo ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]'`" >> ${GITHUB_ENV}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create -t "${REGISTRY_IMAGE}:${{ matrix.variant }}" \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE}:${{ matrix.variant }}"
